seeds:
  - name: city_region
    description: Сопоставление регионов и городов
    config: 
      column_types:
        city: varchar(50)
        region: varchar(100)
    columns:
      - name: city
        description: Название города
        tests:
          - not_null
          - unique
      - name: region
        description: Название региона
        tests:
          - not_null
  